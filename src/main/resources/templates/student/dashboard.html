<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{fragments/header::head('Student Dashboard', 'Manage your job search')}"></head>

<body>

<!-- Sidebar -->
<div th:replace="~{fragments/student-sidebar::sidebar('Dashboard', 'dashboard')}"></div>

<!-- Main Content -->
<div class="dashboard-main">
    <div class="container-fluid">

        <!-- Welcome Card -->
        <div class="glass-card-lg p-5 mb-5 fade-in">
            <div class="row align-items-center">

                <div class="col-lg-8">
                    <h2 class="fw-bold mb-2">
                        Welcome,
                        <span th:text="${currentUser?.fullName ?: 'Student'}">Student</span>
                    </h2>

                    <p class="text-muted mb-0">
                        Track your applications and saved jobs.
                    </p>
                </div>

                <div class="col-lg-4 text-end">
                    <a th:href="@{/jobs}" class="btn btn-primary-gradient">
                        <i class="fas fa-search me-2"></i>
                        Browse Jobs
                    </a>
                </div>

            </div>
        </div>

        <!-- Statistics -->
        <div class="row g-4">

            <!-- Applications -->
            <div class="col-md-6 col-lg-3">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center">
                        <h2 class="fw-bold text-primary"
                            th:text="${stats?.seekerApplicationsSent ?: 0}">
                            0
                        </h2>
                        <p class="text-muted mb-0">
                            Applications
                        </p>
                    </div>
                </div>
            </div>

            <!-- Active -->
            <div class="col-md-6 col-lg-3">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center">
                        <h2 class="fw-bold text-success"
                            th:text="${stats?.seekerActiveApplications ?: 0}">
                            0
                        </h2>
                        <p class="text-muted mb-0">
                            Active
                        </p>
                    </div>
                </div>
            </div>

            <!-- Saved Jobs -->
            <div class="col-md-6 col-lg-3">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center">
                        <h2 class="fw-bold text-warning"
                            th:text="${stats?.seekerSavedJobs ?: 0}">
                            0
                        </h2>
                        <p class="text-muted mb-0">
                            Saved Jobs
                        </p>
                    </div>
                </div>
            </div>

            <!-- Resume -->
            <div class="col-md-6 col-lg-3">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body text-center">
                        <h2 class="fw-bold text-info"
                            th:text="${stats?.resumeStatus ?: 'N/A'}">
                            N/A
                        </h2>
                        <p class="text-muted mb-0">
                            Resume
                        </p>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<div th:replace="~{fragments/header::scripts}"></div>

</body>
</html>
