<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head th:replace="~{fragments/header::head('Saved Jobs - JobPortal', 'Your bookmarked jobs')}"></head>
<body>
    <div th:replace="~{fragments/student-sidebar::sidebar('Saved Jobs', 'saved-jobs')}"></div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="fw-bold mb-0"><i class="fas fa-bookmark me-2" style="color: var(--color-warning);"></i> Saved Jobs</h5>
            <span style="color: var(--text-muted); font-size: var(--font-size-sm);" th:text="${savedJobs != null ? savedJobs.size() + ' jobs saved' : '0 jobs saved'}">0 saved</span>
        </div>
        <div class="card-body p-0">
            <div th:if="${savedJobs != null and !savedJobs.isEmpty()}">
                <div class="row g-0">
                    <div th:each="job : ${savedJobs}" class="col-md-6 col-lg-4 p-3" style="border: 1px solid var(--border-secondary);">
                        <div class="glass-card job-card h-100">
                            <div class="d-flex align-items-start gap-3 mb-3">
                                <div class="job-company-logo">
                                    <i class="fas fa-building"></i>
                                </div>
                                <div class="flex-grow-1" style="min-width: 0;">
                                    <h5 class="job-title" th:text="${job.title()}">Job Title</h5>
                                    <div class="job-company">
                                        <i class="fas fa-building me-1"></i>
                                        <span th:text="${job.company()}">Company</span>
                                    </div>
                                </div>
                            </div>
                            <div class="job-tags">
                                <span class="badge badge-primary"><i class="fas fa-map-marker-alt me-1"></i> <span th:text="${job.location()}">Location</span></span>
                                <span class="badge badge-success" th:if="${job.salaryRange() != null}"><i class="fas fa-dollar-sign me-1"></i> <span th:text="${job.salaryRange()}">Salary</span></span>
                                <span class="badge badge-info" th:if="${job.employmentType() != null}" th:text="${job.employmentType()}">Type</span>
                            </div>
                            <p style="color: var(--text-secondary); font-size: var(--font-size-sm); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 0.75rem 0;"
                               th:text="${#strings.abbreviate(job.description(), 100)}">Description</p>
                            <div class="job-meta">
                                <span class="job-date"><i class="far fa-clock me-1"></i> <span th:text="${#temporals.format(job.createdAt(), 'MMM dd, yyyy')}">Date</span></span>
                                <div class="d-flex gap-1">
                                    <a th:href="@{'/jobs/unsave/' + ${job.id()}}" class="btn btn-outline-glow btn-sm" title="Remove from saved">
                                        <i class="fas fa-bookmark"></i> Saved
                                    </a>
                                    <a th:href="@{'/jobs/view/' + ${job.id()}}" class="btn btn-secondary-glass btn-sm">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${savedJobs == null or savedJobs.isEmpty()}" class="empty-state">
                <div class="empty-icon"><i class="far fa-bookmark"></i></div>
                <h4>No saved jobs</h4>
                <p>Save jobs you're interested in to review them later.</p>
                <a th:href="@{/jobs}" class="btn btn-primary-gradient">
                    <i class="fas fa-search"></i> Browse Jobs
                </a>
            </div>
        </div>
    </div>

    </main></div>
    <div th:replace="~{fragments/header::scripts}"></div>
</body>
</html>
