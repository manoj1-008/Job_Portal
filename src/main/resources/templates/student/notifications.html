<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head th:replace="~{fragments/header::head('Notifications - JobPortal', 'Your notifications')}"></head>
<body>
    <div th:replace="~{fragments/student-sidebar::sidebar('Notifications', 'notifications')}"></div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div>
                <h5 class="fw-bold mb-0"><i class="fas fa-bell me-2" style="color: var(--color-warning);"></i> Notifications</h5>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-ghost btn-sm" id="markAllRead">
                    <i class="fas fa-check-double"></i> Mark All Read
                </button>
                <button class="btn btn-ghost btn-sm" data-bs-toggle="dropdown">
                    <i class="fas fa-filter"></i> Filter
                </button>
                <div class="dropdown dropdown-glass">
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">All</a></li>
                        <li><a class="dropdown-item" href="#">Unread</a></li>
                        <li><a class="dropdown-item" href="#">Applications</a></li>
                        <li><a class="dropdown-item" href="#">Job Alerts</a></li>
                        <li><a class="dropdown-item" href="#">System</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="card-body p-0">
            <div th:if="${notifications != null and !notifications.isEmpty()}">
                <div th:each="notif : ${notifications}" class="activity-item px-4"
                     th:classappend="${!notif.read} ? '' : ''"
                     th:style="${!notif.read} ? 'background: var(--bg-card);' : ''">
                    <div class="activity-icon"
                         th:classappend="${notif.type == 'APPLICATION'} ? 'badge badge-info' : ${notif.type == 'JOB_ALERT'} ? 'badge badge-primary' : 'badge badge-secondary'">
                        <i th:class="${notif.type == 'APPLICATION'} ? 'fas fa-file-alt' : ${notif.type == 'JOB_ALERT'} ? 'fas fa-briefcase' : 'fas fa-bell'"></i>
                    </div>
                    <div class="activity-content">
                        <div class="activity-text" th:text="${notif.message}">Notification message</div>
                        <div class="activity-time d-flex justify-content-between">
                            <span th:text="${#temporals.format(notif.createdAt(), 'MMM dd, yyyy h:mm a')}">Date</span>
                            <span th:if="${!notif.read}" class="badge badge-primary" style="font-size: 0.6rem;">New</span>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${notifications == null or notifications.isEmpty()}" class="empty-state">
                <div class="empty-icon"><i class="far fa-bell"></i></div>
                <h4>No notifications</h4>
                <p>You're all caught up! We'll notify you when there's activity on your account.</p>
            </div>
        </div>
    </div>

    </main></div>
    <div th:replace="~{fragments/header::scripts}"></div>
</body>
</html>
