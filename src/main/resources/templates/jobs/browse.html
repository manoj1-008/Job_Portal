<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head th:replace="~{fragments/header::head('Browse Jobs - JobPortal', 'Find your dream job')}"></head>
<body>
    <div class="aurora-bg"></div>
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="mouse-glow"></div>
    <nav th:replace="~{fragments/header::navbar}"></nav>
    <section class="pt-5 pb-4">
        <div class="container">
            <div class="glass-card-lg p-5 fade-in">
                <div class="text-center mb-4">
                    <h1 class="fw-bold mb-2 gradient-text" style="font-size: 2.5rem; letter-spacing: -1px;">Find Your Dream Job</h1>
                    <p style="color: var(--text-secondary); font-size: var(--font-size-lg);">Browse thousands of opportunities from top companies</p>
                </div>
                <form th:action="@{/jobs/search}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <div class="form-group mb-0 position-relative">
                            <i class="fas fa-search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); z-index: 2;"></i>
                            <input type="text" name="keyword" class="form-input" style="padding-left: 44px;" placeholder="Job title, skill, or keyword..." th:value="${keyword}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group mb-0 position-relative">
                            <i class="fas fa-map-marker-alt" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); z-index: 2;"></i>
                            <input type="text" name="location" class="form-input" style="padding-left: 44px;" placeholder="City or remote..." th:value="${location}">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <select name="employmentType" class="form-input" style="min-height: 48px;">
                            <option value="">All Types</option>
                            <option th:each="type : ${employmentTypes}" th:value="${type}" th:text="${type}" th:selected="${#strings.equals(employmentType, type)}">Type</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary-gradient w-100" style="min-height: 48px;">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
    <section class="pb-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-3">
                    <div class="card sticky-top" style="top: 100px;">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold mb-0"><i class="fas fa-filter me-2" style="color: var(--color-primary);"></i> Filters</h5>
                            <a th:href="@{/jobs}" class="btn btn-ghost btn-sm">Clear</a>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/jobs}" method="get">
                                <div class="mb-3">
                                    <label class="form-label">Experience Level</label>
                                    <select name="experienceLevel" class="form-input">
                                        <option value="">Any</option>
                                        <option th:each="level : ${experienceLevels}" th:value="${level}" th:text="${level}" th:selected="${#strings.equals(param.experienceLevel, level)}">Level</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Salary Min</label>
                                    <select name="salaryMin" class="form-input">
                                        <option value="">Any</option>
                                        <option value="30000">$30k+</option>
                                        <option value="50000">$50k+</option>
                                        <option value="80000">$80k+</option>
                                        <option value="100000">$100k+</option>
                                        <option value="150000">$150k+</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-primary-gradient w-100"><i class="fas fa-filter"></i> Apply Filters</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-9">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold mb-0"><span th:text="${totalJobs ?: 0}">0</span> Jobs Found</h4>
                    </div>
                    <div id="jobResults">
                        <div th:if="${jobs != null and !jobs.isEmpty()}">
                            <div class="row g-3" id="jobGrid">
                                <div th:each="job : ${jobs}" class="col-md-6 col-xl-4">
                                    <div class="glass-card job-card card-lift h-100 p-4">
                                        <div class="d-flex align-items-start gap-3 mb-3">
                                            <div class="job-company-logo"><i class="fas fa-building"></i></div>
                                            <div class="flex-grow-1" style="min-width: 0;">
                                                <a th:href="@{'/jobs/view/' + ${job.id()}}" class="text-decoration-none"><h5 class="job-title" th:text="${job.title()}">Job Title</h5></a>
                                                <div class="job-company"><i class="fas fa-building me-1"></i><span th:text="${job.company()}">Company</span></div>
                                            </div>
                                        </div>
                                        <div class="job-tags">
                                            <span class="badge badge-primary"><i class="fas fa-map-marker-alt me-1"></i> <span th:text="${job.location()}">Location</span>
                                            <span class="badge badge-success" th:if="${job.salaryRange() != null}"><i class="fas fa-dollar-sign me-1"></i> <span th:text="${job.salaryRange()}">Salary</span>
                                            <span class="badge badge-info" th:if="${job.employmentType() != null}" th:text="${job.employmentType()}">Type</span>
                                        </div>
                                        <p style="color: var(--text-secondary); font-size: var(--font-size-sm); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 0.75rem 0;"
                                           th:text="${#strings.abbreviate(job.description(), 120)}">Description</p>
                                        <div class="job-meta mt-auto">
                                            <span class="job-date"><i class="far fa-clock me-1"></i> <span th:text="${#temporals.format(job.createdAt(), 'MMM dd, yyyy')}">Date</span>
                                            <a th:href="@{'/jobs/view/' + ${job.id()}}" class="btn btn-secondary-glass btn-sm"><i class="fas fa-eye"></i> Details</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div th:if="${jobs == null or jobs.isEmpty()}" class="empty-state" style="min-height: 300px;">
                            <div class="empty-icon"><i class="fas fa-search"></i></div>
                            <h4>No jobs found</h4>
                            <p>Try adjusting your search filters or browse by category.</p>
                            <a th:href="@{/jobs}" class="btn btn-primary-gradient">Clear Filters</a>
                        </div>
                    </div>
                    <div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-4">
                        <nav><ul class="pagination">
                            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" class="page-item" th:classappend="${i == currentPage} ? 'active' : ''">
                                <a class="page-link" th:href="@{/jobs(page=${i})}" th:text="${i + 1}">1</a>
                            </li>
                        </ul></nav>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer th:replace="~{fragments/footer::footer}"></footer>
    <div th:replace="~{fragments/header::scripts}"></div>
</body>
</html>
