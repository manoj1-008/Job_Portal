<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header::head('Applications - JobPortal', 'All platform applications')}"></head>
<body>
    <div th:replace="~{fragments/admin-sidebar::sidebar('Applications', 'applications')}"></div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/applications}" method="get" class="row g-3 align-items-end">
                <div class="col-md-3"><label class="form-label">Status</label><select name="status" class="form-input"><option value="">All Status</option><option value="PENDING" th:selected="${#strings.equals(param.status, 'PENDING')}">Pending</option><option value="REVIEWING" th:selected="${#strings.equals(param.status, 'REVIEWING')}">Reviewing</option><option value="SHORTLISTED" th:selected="${#strings.equals(param.status, 'SHORTLISTED')}">Shortlisted</option><option value="HIRED" th:selected="${#strings.equals(param.status, 'HIRED')}">Hired</option><option value="REJECTED" th:selected="${#strings.equals(param.status, 'REJECTED')}">Rejected</option></select></div>
                <div class="col-md-5"><label class="form-label">Search</label><input type="text" name="keyword" class="form-input" placeholder="Search by job title, company, or applicant..." th:value="${keyword}"></div>
                <div class="col-md-2"><button type="submit" class="btn btn-primary-gradient w-100"><i class="fas fa-search"></i> Search</button></div>
                <div class="col-md-2"><a th:href="@{/admin/applications}" class="btn btn-secondary-glass w-100"><i class="fas fa-times"></i> Clear</a></div>
            </form>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-3"><div class="glass p-3 text-center" style="border-radius: var(--radius-lg);"><div class="fw-bold" th:text="${totalApplications ?: 0}">0</div><div style="font-size: var(--font-size-xs); color: var(--text-muted);">Total</div></div></div>
        <div class="col-3"><div class="glass p-3 text-center" style="border-radius: var(--radius-lg);"><div class="fw-bold" th:text="${pendingCount ?: 0}">0</div><div style="font-size: var(--font-size-xs); color: var(--text-muted);">Pending</div></div></div>
        <div class="col-3"><div class="glass p-3 text-center" style="border-radius: var(--radius-lg);"><div class="fw-bold" th:text="${shortlistedCount ?: 0}">0</div><div style="font-size: var(--font-size-xs); color: var(--text-muted);">Shortlisted</div></div></div>
        <div class="col-3"><div class="glass p-3 text-center" style="border-radius: var(--radius-lg);"><div class="fw-bold" th:text="${hiredCount ?: 0}">0</div><div style="font-size: var(--font-size-xs); color: var(--text-muted);">Hired</div></div></div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div th:if="${applications != null and !applications.isEmpty()}">
                <div class="table-responsive">
                    <table class="table-glass">
                        <thead><tr><th>Applicant</th><th>Job</th><th>Company</th><th>Applied</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>
                            <tr th:each="a : ${applications}">
                                <td><div class="d-flex align-items-center gap-2"><div class="profile-avatar" style="width: 36px; height: 36px; font-size: 0.85rem;"><span th:text="${#strings.substring(a.jobSeekerName, 0, 1)}">U</span></div><div><div class="fw-semibold" style="font-size: var(--font-size-sm);" th:text="${a.jobSeekerName}">Name</div><div style="font-size: var(--font-size-xs); color: var(--text-muted);" th:text="${a.jobSeekerEmail}">Email</div></div></div></td>
                                <td style="font-size: var(--font-size-sm);" th:text="${a.jobTitle}">Title</td>
                                <td style="font-size: var(--font-size-sm);" th:text="${a.companyName}">Company</td>
                                <td style="font-size: var(--font-size-sm);" th:text="${#temporals.format(a.appliedAt, 'MMM dd, yyyy')}">Date</td>
                                <td><span class="status-badge" th:class="${a.status.name().toLowerCase()}" th:text="${a.status.name()}">Status</span></td>
                                <td><a th:href="@{'/employer/applicants/' + ${a.id}}" class="btn btn-ghost btn-icon btn-sm"><i class="fas fa-eye"></i></a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div th:if="${applications == null or applications.isEmpty()}" class="empty-state">
                <div class="empty-icon"><i class="fas fa-file-alt"></i></div>
                <h4>No applications found</h4>
            </div>
        </div>
    </div>

    <div th:if="${totalPages > 1}" class="pagination mt-4 justify-content-center">
        <div th:each="i : ${#numbers.sequence(0, totalPages - 1)}" class="page-item" th:classappend="${i == currentPage} ? 'active' : ''">
            <a class="page-link" th:href="@{/admin/applications(page=${i}, status=${param.status}, keyword=${param.keyword})}" th:text="${i + 1}">1</a>
        </div>
    </div>

    </main></div>
    <div th:replace="~{fragments/header::scripts}"></div>
</body>
</html>
