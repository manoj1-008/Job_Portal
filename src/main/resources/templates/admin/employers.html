<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header::head('Manage Employers - JobPortal', 'Employer management')}"></head>
<body>
    <div th:replace="~{fragments/admin-sidebar::sidebar('Manage Employers', 'employers')}"></div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/employers}" method="get" class="row g-3 align-items-end">
                <div class="col-md-6"><label class="form-label">Search</label><input type="text" name="keyword" class="form-input" placeholder="Search by name, email, or company..." th:value="${keyword}"></div>
                <div class="col-md-4"><label class="form-label">Status</label><select name="status" class="form-input"><option value="">All</option><option value="active" th:selected="${#strings.equals(param.status, 'active')}">Active</option><option value="inactive" th:selected="${#strings.equals(param.status, 'inactive')}">Inactive</option></select></div>
                <div class="col-md-2"><button type="submit" class="btn btn-primary-gradient w-100"><i class="fas fa-search"></i> Search</button></div>
            </form>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-4"><div class="glass p-3 text-center" style="border-radius: var(--radius-lg);"><div class="fw-bold" th:text="${totalEmployers ?: 0}">0</div><div style="font-size: var(--font-size-xs); color: var(--text-muted);">Total Employers</div></div></div>
        <div class="col-4"><div class="glass p-3 text-center" style="border-radius: var(--radius-lg);"><div class="fw-bold" th:text="${employersWithJobs ?: 0}">0</div><div style="font-size: var(--font-size-xs); color: var(--text-muted);">With Active Jobs</div></div></div>
        <div class="col-4"><div class="glass p-3 text-center" style="border-radius: var(--radius-lg);"><div class="fw-bold" th:text="${totalJobsByEmployers ?: 0}">0</div><div style="font-size: var(--font-size-xs); color: var(--text-muted);">Total Jobs Posted</div></div></div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div th:if="${employers != null and !employers.isEmpty()}">
                <div class="table-responsive">
                    <table class="table-glass">
                        <thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Phone</th><th>Joined</th><th>Jobs Posted</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>
                            <tr th:each="e : ${employers}">
                                <td><div class="d-flex align-items-center gap-2"><div class="profile-avatar" style="width: 36px; height: 36px; font-size: 0.85rem; background: var(--gradient-warning);"><span th:text="${#strings.substring(e.fullName, 0, 1)}">E</span></div><div class="fw-semibold" style="font-size: var(--font-size-sm);" th:text="${e.fullName}">Name</div></div></td>
                                <td style="font-size: var(--font-size-sm);" th:text="${e.email}">Email</td>
                                <td style="font-size: var(--font-size-sm);" th:text="${e.companyName ?: '-'}">Company</td>
                                <td style="font-size: var(--font-size-sm);" th:text="${e.phone ?: '-'}">Phone</td>
                                <td style="font-size: var(--font-size-sm);" th:text="${#temporals.format(e.createdAt, 'MMM dd, yyyy')}">Date</td>
                                <td><span class="fw-semibold" th:text="${e.jobsCount ?: 0}">0</span></td>
                                <td><span class="status-badge" th:class="${e.enabled} ? 'enabled' : 'disabled'" th:text="${e.enabled} ? 'Enabled' : 'Disabled'">Status</span></td>
                                <td><div class="d-flex gap-1">
                                    <a th:href="@{'/admin/users/' + ${e.id} + '/toggle-status'}" class="btn btn-ghost btn-icon btn-sm"><i th:class="${e.enabled} ? 'fas fa-pause' : 'fas fa-play'" th:style="${e.enabled} ? 'color: var(--color-warning);' : 'color: var(--color-success);'"></i></a>
                                    <button class="btn btn-ghost btn-icon btn-sm" data-bs-toggle="modal" data-bs-target="#deleteEmployerModal" th:attr="data-user-id=${e.id}, data-user-name=${e.fullName}"><i class="fas fa-trash" style="color: var(--color-danger);"></i></button>
                                </div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div th:if="${employers == null or employers.isEmpty()}" class="empty-state">
                <div class="empty-icon"><i class="fas fa-building"></i></div>
                <h4>No employers found</h4>
            </div>
        </div>
    </div>

    <div th:if="${totalPages > 1}" class="pagination mt-4 justify-content-center">
        <div th:each="i : ${#numbers.sequence(0, totalPages - 1)}" class="page-item" th:classappend="${i == currentPage} ? 'active' : ''">
            <a class="page-link" th:href="@{/admin/employers(page=${i}, keyword=${param.keyword}, status=${param.status})}" th:text="${i + 1}">1</a>
        </div>
    </div>

    <div class="modal modal-glass fade" id="deleteEmployerModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title fw-bold" style="color: var(--color-danger);">Delete Employer</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body"><p style="color: var(--text-secondary);">Delete <strong id="deleteEmployerName">this employer</strong>? All their jobs will be removed.</p></div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary-glass" data-bs-dismiss="modal">Cancel</button><a th:href="@{/admin/users/}" id="deleteEmployerConfirm" class="btn btn-danger"><i class="fas fa-trash"></i> Delete</a></div>
        </div></div>
    </div>

    </main></div>
    <div th:replace="~{fragments/header::scripts}"></div>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const m = document.getElementById('deleteEmployerModal');
        if (m) {
            m.addEventListener('show.bs.modal', function(e) {
                const b = e.relatedTarget;
                document.getElementById('deleteEmployerName').textContent = b.getAttribute('data-user-name') || 'this employer';
                document.getElementById('deleteEmployerConfirm').href = '/admin/users/' + b.getAttribute('data-user-id') + '/delete';
            });
        }
    });
    </script>
</body>
</html>
