<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header::head('Access Denied - JobPortal', 'You do not have permission to access this page')}"></head>
<body>
    <div class="aurora-bg"></div>
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="mouse-glow"></div>

    <!-- Navbar -->
    <nav th:replace="~{fragments/header::navbar}"></nav>

    <div class="auth-container" style="min-height: 80vh;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 text-center">
                    <div class="glass-card-lg p-5 fade-in">
                        <div style="font-size: 5rem; color: var(--color-danger); opacity: 0.6; margin-bottom: 1.5rem;">
                            <i class="fas fa-shield-halved"></i>
                        </div>
                        <h1 class="display-4 fw-bold mb-3" style="letter-spacing: -2px;">403</h1>
                        <h3 class="fw-bold mb-3">Access Denied</h3>
                        <p style="color: var(--text-secondary); font-size: var(--font-size-lg); max-width: 400px; margin: 0 auto 2rem;">
                            You don't have permission to access this page. Please contact your administrator if you believe this is a mistake.
                        </p>
                        <div class="d-flex justify-content-center gap-3">
                            <a th:href="@{/}" class="btn btn-primary-gradient">
                                <i class="fas fa-home"></i> Go Home
                            </a>
                            <a th:href="@{/login}" class="btn btn-secondary-glass">
                                <i class="fas fa-sign-in-alt"></i> Sign In
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer::footer}"></footer>
    <div th:replace="~{fragments/header::scripts}"></div>
</body>
</html>
