<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header::head('Company Profile - JobPortal', 'Manage your company profile')}"></head>
<body>
    <div th:replace="~{fragments/employer-sidebar::sidebar('Company Profile', 'profile')}"></div>

    <!-- Company Header -->
    <div class="card mb-4" style="overflow: hidden;">
        <div style="height: 120px; background: var(--gradient-primary); opacity: 0.3;"></div>
        <div class="card-body" style="margin-top: -60px;">
            <div class="d-flex align-items-end gap-4">
                <div style="width: 100px; height: 100px; border-radius: var(--radius-2xl); background: var(--bg-card); border: 4px solid var(--bg-primary); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--color-primary);">
                    <i class="fas fa-building"></i>
                </div>
                <div class="flex-grow-1">
                    <h3 class="fw-bold" th:text="${companyName ?: 'Your Company'}">Company Name</h3>
                    <div style="color: var(--text-secondary); font-size: var(--font-size-sm);">
                        <i class="fas fa-map-marker-alt me-1"></i> <span th:text="${companyLocation ?: 'Location not set'}">Location</span>
                        <span class="ms-3"><i class="fas fa-globe me-1"></i> <span th:text="${companyWebsite ?: 'Website not set'}">Website</span></span>
                    </div>
                </div>
                <button class="btn btn-primary-gradient" data-bs-toggle="modal" data-bs-target="#editCompanyModal">
                    <i class="fas fa-edit"></i> Edit Profile
                </button>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <!-- About -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="fw-bold mb-0"><i class="fas fa-info-circle me-2" style="color: var(--color-primary);"></i> About Company</h5>
                </div>
                <div class="card-body">
                    <p style="color: var(--text-secondary); line-height: 1.8;" th:text="${companyDescription ?: 'No company description added yet. Tell job seekers about your company mission, culture, and what makes you a great place to work.'}">Description</p>
                </div>
            </div>

            <!-- Open Positions -->
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0"><i class="fas fa-briefcase me-2" style="color: var(--color-info);"></i> Open Positions</h5>
                    <a th:href="@{/employer/jobs/post}" class="btn btn-primary-gradient btn-sm">
                        <i class="fas fa-plus"></i> Post New Job
                    </a>
                </div>
                <div class="card-body p-0">
                    <div th:if="${openPositions != null and !openPositions.isEmpty()}">
                        <div th:each="job : ${openPositions}" class="px-4 py-3" style="border-bottom: 1px solid var(--border-secondary);">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-semibold" th:text="${job.title()}">Title</div>
                                    <div style="font-size: var(--font-size-xs); color: var(--text-muted);">
                                        <span th:text="${job.location()}">Location</span> · <span th:text="${job.employmentType() ?: 'Full-time'}">Type</span>
                                    </div>
                                </div>
                                <a th:href="@{'/employer/jobs/' + ${job.id()} + '/edit'}" class="btn btn-ghost btn-sm">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                            </div>
                        </div>
                    </div>
                    <div th:if="${openPositions == null or openPositions.isEmpty()}" class="empty-state" style="padding: 1.5rem;">
                        <p style="font-size: var(--font-size-sm);">No open positions yet.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <!-- Company Details -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="fw-bold mb-0"><i class="fas fa-building me-2" style="color: var(--color-success);"></i> Company Details</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <div style="font-size: var(--font-size-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Industry</div>
                        <div class="fw-semibold" th:text="${companyIndustry ?: 'Not specified'}">Industry</div>
                    </div>
                    <div class="mb-3">
                        <div style="font-size: var(--font-size-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Company Size</div>
                        <div class="fw-semibold" th:text="${companySize ?: 'Not specified'}">Size</div>
                    </div>
                    <div class="mb-3">
                        <div style="font-size: var(--font-size-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Founded</div>
                        <div class="fw-semibold" th:text="${companyFounded ?: 'Not specified'}">Year</div>
                    </div>
                    <div>
                        <div style="font-size: var(--font-size-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Social Links</div>
                        <div class="d-flex gap-2 mt-2">
                            <a href="#" class="btn btn-ghost btn-icon btn-sm"><i class="fab fa-linkedin-in"></i></a>
                            <a href="#" class="btn btn-ghost btn-icon btn-sm"><i class="fab fa-twitter"></i></a>
                            <a href="#" class="btn btn-ghost btn-icon btn-sm"><i class="fab fa-facebook-f"></i></a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Benefits -->
            <div class="card">
                <div class="card-header">
                    <h5 class="fw-bold mb-0"><i class="fas fa-gift me-2" style="color: var(--color-warning);"></i> Benefits</h5>
                </div>
                <div class="card-body">
                    <div th:if="${benefits != null and !benefits.isEmpty()}">
                        <div th:each="benefit : ${benefits}" class="d-flex align-items-center gap-2 mb-2">
                            <i class="fas fa-check-circle" style="color: var(--color-success); font-size: var(--font-size-sm);"></i>
                            <span style="font-size: var(--font-size-sm);" th:text="${benefit}">Benefit</span>
                        </div>
                    </div>
                    <div th:if="${benefits == null or benefits.isEmpty()}" style="color: var(--text-muted); font-size: var(--font-size-sm);">
                        No benefits added yet.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Company Modal -->
    <div class="modal modal-glass fade" id="editCompanyModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Edit Company Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/employer/profile/update}" method="post">
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Company Name</label>
                                    <input type="text" name="companyName" class="form-input" th:value="${companyName}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Industry</label>
                                    <input type="text" name="industry" class="form-input" th:value="${companyIndustry}" placeholder="e.g. Technology, Healthcare">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Website</label>
                                    <input type="url" name="website" class="form-input" th:value="${companyWebsite}" placeholder="https://example.com">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Location</label>
                                    <input type="text" name="location" class="form-input" th:value="${companyLocation}" placeholder="City, Country">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Company Size</label>
                                    <select name="size" class="form-input">
                                        <option value="1-10" th:selected="${companySize == '1-10'}">1-10 employees</option>
                                        <option value="11-50" th:selected="${companySize == '11-50'}">11-50 employees</option>
                                        <option value="51-200" th:selected="${companySize == '51-200'}">51-200 employees</option>
                                        <option value="201-1000" th:selected="${companySize == '201-1000'}">201-1000 employees</option>
                                        <option value="1000+" th:selected="${companySize == '1000+'}">1000+ employees</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Founded Year</label>
                                    <input type="number" name="founded" class="form-input" th:value="${companyFounded}" placeholder="e.g. 2020">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Social (LinkedIn)</label>
                                    <input type="url" name="linkedin" class="form-input" placeholder="LinkedIn URL">
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">About Company</label>
                                    <textarea name="description" class="form-input" rows="4" th:text="${companyDescription}" placeholder="Tell job seekers about your company..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary-glass" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary-gradient">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    </main></div>
    <div th:replace="~{fragments/header::scripts}"></div>
</body>
</html>
