<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header::head('Post a Job - JobPortal', 'Create a new job posting')}"></head>
<body>
    <div th:replace="~{fragments/employer-sidebar::sidebar('Post a Job', 'post-job')}"></div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card">
                <div class="card-header">
                    <h5 class="fw-bold mb-0"><i class="fas fa-plus-circle me-2" style="color: var(--color-primary);"></i> Create New Job Posting</h5>
                    <p style="color: var(--text-secondary); font-size: var(--font-size-sm); margin-top: 0.25rem;">Fill in the details below to attract the best candidates.</p>
                </div>
                <div class="card-body">
                    <form th:action="@{/employer/jobs/post}" th:object="${createJobRequest}" method="post">

                        <!-- Basic Details -->
                        <h6 class="fw-bold mb-3" style="color: var(--color-primary);">
                            <i class="fas fa-info-circle me-2"></i>Basic Details
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <div class="form-group">
                                    <label class="form-label">Job Title <span style="color: var(--color-danger);">*</span></label>
                                    <input type="text" name="title" class="form-input" placeholder="e.g. Senior Software Engineer" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Company <span style="color: var(--color-danger);">*</span></label>
                                    <input type="text" name="company" class="form-input" placeholder="Your company name" required>
                                </div>
                            </div>
                        </div>

                        <!-- Description -->
                        <h6 class="fw-bold mb-3" style="color: var(--color-info);">
                            <i class="fas fa-align-left me-2"></i>Job Description
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label">Description <span style="color: var(--color-danger);">*</span></label>
                                    <textarea name="description" class="form-input" rows="6"
                                              placeholder="Describe the role, responsibilities, and what makes this opportunity great..." required></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Location & Type -->
                        <h6 class="fw-bold mb-3" style="color: var(--color-success);">
                            <i class="fas fa-map-marker-alt me-2"></i>Location & Employment Details
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Location <span style="color: var(--color-danger);">*</span></label>
                                    <input type="text" name="location" class="form-input" placeholder="e.g. New York, NY (or Remote)" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Employment Type</label>
                                    <select name="employmentType" class="form-input">
                                        <option value="Full-time">Full-time</option>
                                        <option value="Part-time">Part-time</option>
                                        <option value="Contract">Contract</option>
                                        <option value="Internship">Internship</option>
                                        <option value="Freelance">Freelance</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Experience Level</label>
                                    <select name="experienceLevel" class="form-input">
                                        <option value="Entry Level">Entry Level</option>
                                        <option value="Mid Level">Mid Level</option>
                                        <option value="Senior">Senior</option>
                                        <option value="Lead">Lead</option>
                                        <option value="Manager">Manager</option>
                                        <option value="Director">Director</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Salary -->
                        <h6 class="fw-bold mb-3" style="color: var(--color-warning);">
                            <i class="fas fa-dollar-sign me-2"></i>Salary Range
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Minimum Salary</label>
                                    <input type="number" name="salaryMin" class="form-input" placeholder="e.g. 80000" step="0.01">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Maximum Salary</label>
                                    <input type="number" name="salaryMax" class="form-input" placeholder="e.g. 120000" step="0.01">
                                </div>
                            </div>
                        </div>

                        <!-- Skills & Deadline -->
                        <h6 class="fw-bold mb-3" style="color: var(--color-pink);">
                            <i class="fas fa-code me-2"></i>Skills & Requirements
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <div class="form-group">
                                    <label class="form-label">Skills Required</label>
                                    <input type="text" name="skills" class="form-input" placeholder="e.g. Java, Spring Boot, React, PostgreSQL (comma separated)">
                                    <div class="form-hint">Comma separated list of skills</div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label">Application Deadline <span style="color: var(--color-danger);">*</span></label>
                                    <input type="date" name="deadline" class="form-input" required>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-4 pt-4" style="border-top: 1px solid var(--border-primary);">
                            <button type="submit" class="btn btn-primary-gradient btn-lg">
                                <i class="fas fa-cloud-upload-alt"></i> Publish Job
                            </button>
                            <a th:href="@{/employer/jobs}" class="btn btn-secondary-glass btn-lg">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    </main></div>
    <div th:replace="~{fragments/header::scripts}"></div>
</body>
</html>
