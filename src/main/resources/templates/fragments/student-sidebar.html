<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<!-- Student Sidebar Fragment -->
<div th:fragment="sidebar(pageTitle, activePage)" class="dashboard-wrapper">
    <!-- Aurora Backgrounds -->
    <div class="aurora-bg"></div>
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="mouse-glow"></div>

    <!-- Navbar -->
    <nav th:replace="~{fragments/header::navbar}"></nav>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="dashboard-sidebar" id="studentSidebar">
        <a th:href="@{/student/dashboard}" class="sidebar-logo">
            <i class="fas fa-briefcase"></i> JobPortal
        </a>

        <div class="sidebar-section">Main Menu</div>

        <a th:href="@{/student/dashboard}"
           class="nav-item"
           th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
            <i class="fas fa-th-large"></i> Dashboard
        </a>

        <a th:href="@{/jobs}"
           class="nav-item"
           th:classappend="${activePage == 'browse-jobs'} ? 'active' : ''">
            <i class="fas fa-search"></i> Browse Jobs
        </a>

        <a th:href="@{/student/applications}"
           class="nav-item"
           th:classappend="${activePage == 'applications'} ? 'active' : ''">
            <i class="fas fa-file-alt"></i> Applications
            <span class="badge badge-primary ms-auto" th:if="${pendingCount != null && pendingCount > 0}" th:text="${pendingCount}">0</span>
        </a>

        <a th:href="@{/student/saved-jobs}"
           class="nav-item"
           th:classappend="${activePage == 'saved-jobs'} ? 'active' : ''">
            <i class="fas fa-bookmark"></i> Saved Jobs
            <span class="badge badge-primary ms-auto" th:if="${savedCount != null && savedCount > 0}" th:text="${savedCount}">0</span>
        </a>

        <div class="sidebar-section">Profile</div>

        <a th:href="@{/student/resume}"
           class="nav-item"
           th:classappend="${activePage == 'resume'} ? 'active' : ''">
            <i class="fas fa-file-pdf"></i> Resume
        </a>

        <a th:href="@{/student/profile}"
           class="nav-item"
           th:classappend="${activePage == 'profile'} ? 'active' : ''">
            <i class="fas fa-user-cog"></i> Profile
        </a>

        <a th:href="@{/student/notifications}"
           class="nav-item"
           th:classappend="${activePage == 'notifications'} ? 'active' : ''">
            <i class="fas fa-bell"></i> Notifications
            <span class="badge badge-primary ms-auto" th:if="${unreadNotifications != null && unreadNotifications > 0}" th:text="${unreadNotifications}">0</span>
        </a>

        <a th:href="@{/student/settings}"
           class="nav-item"
           th:classappend="${activePage == 'settings'} ? 'active' : ''">
            <i class="fas fa-cog"></i> Settings
        </a>

        <div class="sidebar-section">Account</div>

<form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="nav-item" style="margin-top: auto; background:none;border:none;width:100%;cursor:pointer;text-align:left;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </form>

        <!-- Profile Summary -->
        <div class="glass mt-4 p-3" style="border-radius: var(--radius-lg);">
            <div class="d-flex align-items-center gap-3">
                <div class="profile-avatar" style="width: 40px; height: 40px; font-size: 1rem;">
                    <span th:text="${currentUser != null ? #strings.substring(currentUser.fullName, 0, 1) : 'U'}">U</span>
                </div>
                <div style="min-width: 0;">
                    <div style="font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                         th:text="${currentUser?.fullName ?: 'User'}">User</div>
                    <div style="font-size: var(--font-size-xs); color: var(--text-muted);">Job Seeker</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
        <div class="container-fluid">
            <!-- Header -->
            <div class="dashboard-header">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-ghost btn-icon d-lg-none" id="sidebarToggle" aria-label="Toggle sidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div>
                        <h1 th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h1>
                        <p style="color: var(--text-secondary); font-size: var(--font-size-sm); margin: 0;">
                            <span th:text="${currentDate != null ? #temporals.format(currentDate, 'EEEE, MMMM d, yyyy') : 'Today'}">Today</span>
                        </p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                        <i class="fas fa-moon" id="themeIcon"></i>
                    </button>
                    <div class="dropdown dropdown-glass">
                        <button class="btn btn-ghost btn-icon position-relative" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-bell"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge badge-danger"
                                  th:if="${unreadNotifications != null && unreadNotifications > 0}"
                                  th:text="${unreadNotifications > 9 ? '9+' : unreadNotifications}"
                                  style="font-size: 0.6rem; padding: 2px 5px;">0</span>
                        </button>
                    </div>
                    <div class="dropdown dropdown-glass">
                        <button class="btn btn-ghost btn-icon" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-ellipsis-vertical"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Success Message -->
            <div th:if="${successMessage}" class="alert alert-success mb-4 alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle alert-icon"></i>
                <div class="alert-content" th:text="${successMessage}">Success</div>
                <button type="button" class="alert-close" data-bs-dismiss="alert"><i class="fas fa-times"></i></button>
            </div>

            <!-- Error Message -->
            <div th:if="${errorMessage}" class="alert alert-danger mb-4 alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle alert-icon"></i>
                <div class="alert-content" th:text="${errorMessage}">Error</div>
                <button type="button" class="alert-close" data-bs-dismiss="alert"><i class="fas fa-times"></i></button>
            </div>

</body>
</html>
