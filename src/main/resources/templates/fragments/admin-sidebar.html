<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<div th:fragment="sidebar(pageTitle, activePage)" class="dashboard-wrapper">
    <div class="aurora-bg"></div>
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="mouse-glow"></div>

    <nav th:replace="~{fragments/header::navbar}"></nav>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="dashboard-sidebar" id="adminSidebar">
        <a th:href="@{/admin/dashboard}" class="sidebar-logo">
            <i class="fas fa-shield-halved"></i> Admin Console
        </a>

        <div class="sidebar-section">Platform</div>
        <a th:href="@{/admin/dashboard}" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <a th:href="@{/admin/analytics}" class="nav-item" th:classappend="${activePage == 'analytics'} ? 'active' : ''">
            <i class="fas fa-chart-line"></i> Analytics
        </a>

        <div class="sidebar-section">Management</div>
        <a th:href="@{/admin/users}" class="nav-item" th:classappend="${activePage == 'users'} ? 'active' : ''">
            <i class="fas fa-users"></i> All Users
        </a>
        <a th:href="@{/admin/students}" class="nav-item" th:classappend="${activePage == 'students'} ? 'active' : ''">
            <i class="fas fa-user-graduate"></i> Students
        </a>
        <a th:href="@{/admin/employers}" class="nav-item" th:classappend="${activePage == 'employers'} ? 'active' : ''">
            <i class="fas fa-building"></i> Employers
        </a>
        <a th:href="@{/admin/jobs}" class="nav-item" th:classappend="${activePage == 'jobs'} ? 'active' : ''">
            <i class="fas fa-briefcase"></i> Jobs
        </a>
        <a th:href="@{/admin/applications}" class="nav-item" th:classappend="${activePage == 'applications'} ? 'active' : ''">
            <i class="fas fa-file-alt"></i> Applications
        </a>

        <div class="sidebar-section">Insights</div>
        <a th:href="@{/admin/reports}" class="nav-item" th:classappend="${activePage == 'reports'} ? 'active' : ''">
            <i class="fas fa-file-chart-column"></i> Reports
        </a>
        <a th:href="@{/admin/audit-logs}" class="nav-item" th:classappend="${activePage == 'audit-logs'} ? 'active' : ''">
            <i class="fas fa-history"></i> Audit Logs
        </a>

        <div class="sidebar-section">System</div>
        <a th:href="@{/admin/notifications}" class="nav-item" th:classappend="${activePage == 'notifications'} ? 'active' : ''">
            <i class="fas fa-bell"></i> Notifications
        </a>
        <a th:href="@{/admin/settings}" class="nav-item" th:classappend="${activePage == 'settings'} ? 'active' : ''">
            <i class="fas fa-cog"></i> Settings
        </a>

        <div class="sidebar-section">Account</div>
<form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="nav-item" style="background:none;border:none;width:100%;cursor:pointer;text-align:left;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </form>

        <div class="glass mt-4 p-3" style="border-radius: var(--radius-lg);">
            <div class="d-flex align-items-center gap-3">
                <div class="profile-avatar" style="width: 40px; height: 40px; font-size: 1rem;">
                    <span th:text="${currentUser != null ? #strings.substring(currentUser.fullName, 0, 1) : 'A'}">A</span>
                </div>
                <div>
                    <div style="font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);" th:text="${currentUser?.fullName ?: 'Admin'}">Admin</div>
                    <div style="font-size: var(--font-size-xs); color: var(--text-muted);">Administrator</div>
                </div>
                <div class="ms-auto"><span class="badge badge-primary">Admin</span></div>
            </div>
        </div>
    </aside>

    <main class="dashboard-main">
        <div class="container-fluid">
            <div class="dashboard-header">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-ghost btn-icon d-lg-none" id="sidebarToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div>
                        <h1 th:text="${pageTitle} ?: 'Admin Dashboard'">Dashboard</h1>
                        <p style="color: var(--text-secondary); font-size: var(--font-size-sm); margin: 0;">
                            <span th:text="${currentDate != null ? #temporals.format(currentDate, 'EEEE, MMMM d, yyyy') : 'Today'}">Today</span>
                        </p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon" id="themeIcon"></i></button>
                    <div class="dropdown dropdown-glass">
                        <button class="btn btn-ghost btn-icon position-relative" data-bs-toggle="dropdown">
                            <i class="fas fa-bell"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge badge-danger"
                                  th:if="${unreadNotifications != null && unreadNotifications > 0}"
                                  th:text="${unreadNotifications > 9 ? '9+' : unreadNotifications}">0</span>
                        </button>
                    </div>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success mb-4 alert-dismissible fade show">
                <i class="fas fa-check-circle alert-icon"></i>
                <div class="alert-content" th:text="${successMessage}">Success</div>
                <button type="button" class="alert-close" data-bs-dismiss="alert"><i class="fas fa-times"></i></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger mb-4 alert-dismissible fade show">
                <i class="fas fa-exclamation-circle alert-icon"></i>
                <div class="alert-content" th:text="${errorMessage}">Error</div>
                <button type="button" class="alert-close" data-bs-dismiss="alert"><i class="fas fa-times"></i></button>
            </div>
</body>
</html>
