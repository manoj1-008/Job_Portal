<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head th:fragment="head(title, description)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" th:content="${description} ?: 'Online Job Portal - Find your dream career'">
    <title th:text="${title} ?: 'JobPortal'">JobPortal</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body th:fragment="body">
    <div class="aurora-bg"></div>
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="aurora-blob aurora-blob-3"></div>
    <div class="mouse-glow"></div>
</body>

<nav class="navbar navbar-expand-lg navbar-glass fixed-top" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="fas fa-briefcase"></i> JobPortal
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="fas fa-home me-1"></i> Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/jobs}"><i class="fas fa-search me-1"></i> Jobs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/about}"><i class="fas fa-info-circle me-1"></i> About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contact}"><i class="fas fa-envelope me-1"></i> Contact</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>

                <!-- Not Logged In -->
                <div th:unless="${isAuthenticated}">
                    <a th:href="@{/login}" class="btn btn-glass-secondary btn-sm me-2">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                    <a th:href="@{/register}" class="btn btn-glass btn-sm">
                        <i class="fas fa-user-plus"></i> Register
                    </a>
                </div>

                <!-- Logged In -->
                <div th:if="${isAuthenticated}" class="dropdown dropdown-glass">
                    <button class="btn btn-glass-secondary btn-sm dropdown-toggle" type="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user-circle me-1"></i>
                        <span th:text="${currentUser?.fullName ?: 'User'}">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <!-- Admin Links -->
                        <li th:if="${currentUser?.isAdmin()}">
                            <a class="dropdown-item" th:href="@{/admin/dashboard}">
                                <i class="fas fa-tachometer-alt"></i> Dashboard
                            </a>
                            <a class="dropdown-item" th:href="@{/admin/users}">
                                <i class="fas fa-users"></i> Manage Users
                            </a>
                            <a class="dropdown-item" th:href="@{/admin/jobs}">
                                <i class="fas fa-briefcase"></i> Manage Jobs
                            </a>
                            <div class="dropdown-divider"></div>
                        </li>
                        <!-- Employer Links -->
                        <li th:if="${currentUser?.isEmployer()}">
                            <a class="dropdown-item" th:href="@{/employer/dashboard}">
                                <i class="fas fa-tachometer-alt"></i> Dashboard
                            </a>
                            <a class="dropdown-item" th:href="@{/employer/jobs}">
                                <i class="fas fa-briefcase"></i> My Jobs
                            </a>
                            <a class="dropdown-item" th:href="@{/employer/jobs/post}">
                                <i class="fas fa-plus-circle"></i> Post Job
                            </a>
                            <a class="dropdown-item" th:href="@{/employer/applicants}">
                                <i class="fas fa-users"></i> Applicants
                            </a>
                            <div class="dropdown-divider"></div>
                        </li>
                        <!-- Student Links -->
                        <li th:if="${currentUser?.isJobSeeker()}">
                            <a class="dropdown-item" th:href="@{/student/dashboard}">
                                <i class="fas fa-tachometer-alt"></i> Dashboard
                            </a>
                            <a class="dropdown-item" th:href="@{/student/applications}">
                                <i class="fas fa-file-alt"></i> My Applications
                            </a>
                            <a class="dropdown-item" th:href="@{/student/saved-jobs}">
                                <i class="fas fa-bookmark"></i> Saved Jobs
                            </a>
                            <a class="dropdown-item" th:href="@{/student/profile}">
                                <i class="fas fa-user-cog"></i> Profile
                            </a>
                            <div class="dropdown-divider"></div>
                        </li>
<!-- Common -->
                        <li>
                            <form th:action="@{/logout}" method="post" style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="dropdown-item" style="background:none;border:none;width:100%;text-align:left;cursor:pointer;">
                                    <i class="fas fa-sign-out-alt"></i> Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</div>
</html>
