<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<div th:fragment="sidebar(pageTitle, activePage)" class="dashboard-wrapper">
    <div class="aurora-bg"></div>
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="mouse-glow"></div>

    <nav th:replace="~{fragments/header::navbar}"></nav>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="dashboard-sidebar" id="employerSidebar">
        <a th:href="@{/employer/dashboard}" class="sidebar-logo">
            <i class="fas fa-briefcase"></i> JobPortal
        </a>

        <div class="sidebar-section">Recruitment</div>

        <a th:href="@{/employer/dashboard}"
           class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <a th:href="@{/employer/jobs}"
           class="nav-item" th:classappend="${activePage == 'jobs'} ? 'active' : ''">
            <i class="fas fa-briefcase"></i> My Jobs
        </a>
        <a th:href="@{/employer/jobs/post}"
           class="nav-item" th:classappend="${activePage == 'post-job'} ? 'active' : ''">
            <i class="fas fa-plus-circle"></i> Post Job
        </a>
        <a th:href="@{/employer/applicants}"
           class="nav-item" th:classappend="${activePage == 'applicants'} ? 'active' : ''">
            <i class="fas fa-users"></i> Applicants
        </a>

        <div class="sidebar-section">Company</div>

        <a th:href="@{/employer/profile}"
           class="nav-item" th:classappend="${activePage == 'profile'} ? 'active' : ''">
            <i class="fas fa-building"></i> Company Profile
        </a>
        <a th:href="@{/employer/notifications}"
           class="nav-item" th:classappend="${activePage == 'notifications'} ? 'active' : ''">
            <i class="fas fa-bell"></i> Notifications
        </a>
        <a th:href="@{/employer/settings}"
           class="nav-item" th:classappend="${activePage == 'settings'} ? 'active' : ''">
            <i class="fas fa-cog"></i> Settings
        </a>

        <div class="sidebar-section">Account</div>

        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="nav-item" style="background:none;border:none;width:100%;cursor:pointer;text-align:left;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </form>

        <div class="glass mt-4 p-3" style="border-radius: var(--radius-lg);">
            <div class="d-flex align-items-center gap-3">
                <div class="profile-avatar" style="width: 40px; height: 40px; font-size: 1rem;">
                    <span th:text="${currentUser != null ? #strings.substring(currentUser.fullName, 0, 1) : 'E'}">E</span>
                </div>
                <div style="min-width: 0;">
                    <div style="font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);"
                         th:text="${currentUser?.fullName ?: 'Employer'}">Employer</div>
                    <div style="font-size: var(--font-size-xs); color: var(--text-muted);">Employer Account</div>
            </div>
    </aside>

    <main class="dashboard-main">
        <div class="container-fluid">
            <div class="dashboard-header">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-ghost btn-icon d-lg-none" id="sidebarToggle" aria-label="Toggle sidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div>
                        <h1 th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h1>
                        <p style="color: var(--text-secondary); font-size: var(--font-size-sm); margin: 0;">
                            <span th:text="${currentDate != null ? #temporals.format(currentDate, 'EEEE, MMMM d, yyyy') : 'Today'}">Today</span>
                        </p>
                    </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success mb-4 alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle alert-icon"></i>
                <div class="alert-content" th:text="${successMessage}">Success</div>
                <button type="button" class="alert-close" data-bs-dismiss="alert"><i class="fas fa-times"></i></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger mb-4 alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle alert-icon"></i>
                <div class="alert-content" th:text="${errorMessage}">Error</div>
                <button type="button" class="alert-close" data-bs-dismiss="alert"><i class="fas fa-times"></i></button>
            </div>
</body>
</html>
